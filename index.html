/* ------------------------------------------------------------------
   INITIALISE
------------------------------------------------------------------ */

initialise();

async function initialise() {
  showCurrentReach();

  var reachId = getReachIdFromUrl();

  if (!reachId) {
    setStatus("No reach_id was found in the URL. Open this page with ?reach_id=YOUR_REACH_ID.", "error");
    setEmptyMeasureList("No reach selected.");
    return;
  }

  if (!isUrlConfigured(CONFIG.SELECTED_MEASURES_TABLE_URL)) {
    setStatus("SELECTED_MEASURES_TABLE_URL has not been configured in the script.", "error");
    setEmptyMeasureList("Selected measures table is not configured.");
    return;
  }

  try {
    setStatus("Loading selected measures for reach " + reachId + "...", "");

    var rows = await querySelectedRowsForReach(reachId);

    renderMeasureList(rows);

    if (rows.length === 0) {
      setStatus("No measures have been selected yet for reach " + reachId + ".", "");
    } else {
      setStatus("Showing " + rows.length + " measure(s) selected for reach " + reachId + ".", "success");
    }

  } catch (error) {
    console.error(error);
    setStatus("Could not load selected measures: " + error.message, "error");
    setEmptyMeasureList("Could not load selected measures.");
  }
}

/* ------------------------------------------------------------------
   RENDER LIST
------------------------------------------------------------------ */

function renderMeasureList(rows) {
  document.getElementById("selected-count").textContent = rows.length;

  if (rows.length === 0) {
    setEmptyMeasureList("No measures selected for this reach.");
    return;
  }

  // Enrich each row with a group / sort order, falling back to the
  // static MEASURES table if a row does not carry name/group itself.
  var enriched = rows.map(function(row) {
    var lookup = getMeasureById(row.measure_id);

    return {
      id: row.measure_id,
      name: row.measure_name || (lookup ? lookup.name : row.measure_id),
      group: row.measure_group || (lookup ? lookup.group : "Other"),
      location_group: lookup ? lookup.location_group : "Others",
      measure_no: lookup ? lookup.measure_no : 999999
    };
  });

  // Optional URL filter: ?location=Reach | Assigned to Reach | Others
  var locationFilter = getLocationFromUrl();

  if (locationFilter) {
    enriched = enriched.filter(function(m) {
      return normaliseLocationValue(m.location_group) === normaliseLocationValue(locationFilter);
    });
  }

  if (enriched.length === 0) {
    setEmptyMeasureList(
      locationFilter
        ? "No measures selected for this reach match location '" + locationFilter + "'."
        : "No measures selected for this reach."
    );
    document.getElementById("selected-count").textContent = 0;
    return;
  }

  enriched.sort(function(a, b) {
    return a.measure_no - b.measure_no;
  });

  var groups = {};
  var groupOrder = [];

  enriched.forEach(function(m) {
    if (!groups[m.group]) {
      groups[m.group] = [];
      groupOrder.push(m.group);
    }
    groups[m.group].push(m);
  });

  var container = document.getElementById("measure-list");
  container.innerHTML = "";

  groupOrder.forEach(function(gname) {
    var gh = document.createElement("div");
    gh.className = "group-header";
    gh.innerHTML = '<span class="group-label">' + escapeHtml(gname) + '</span>';
    container.appendChild(gh);

    groups[gname].forEach(function(m) {
      var el = document.createElement("div");
      el.className = "measure-item";

      el.innerHTML =
        '<span class="measure-id">' + escapeHtml(m.id) + '</span>' +
        '<span class="measure-name">' + escapeHtml(m.name) + '</span>';

      container.appendChild(el);
    });
  });
}

function setEmptyMeasureList(message) {
  var container = document.getElementById("measure-list");
  container.innerHTML = '<div class="empty-state">' + escapeHtml(message) + '</div>';
}

/* ------------------------------------------------------------------
   CURRENT REACH
------------------------------------------------------------------ */

function getReachIdFromUrl() {
  var params = new URLSearchParams(window.location.search);

  return (
    params.get("reach_id") ||
    params.get("Reach_ID") ||
    params.get("REACH_ID") ||
    params.get("segment_id") ||
    params.get("id")
  );
}

function getLocationFromUrl() {
  var params = new URLSearchParams(window.location.search);

  return (
    params.get("location") ||
    params.get("location_group") ||
    params.get("Location") ||
    null
  );
}

function normaliseLocationValue(value) {
  return String(value).trim().toLowerCase();
}

function showCurrentReach() {
  var reachId = getReachIdFromUrl();
  var el = document.getElementById("reach-display");

  if (!el) { return; }

  if (reachId) {
    el.textContent = "Current reach: " + reachId;
  } else {
    el.textContent = "No reach selected";
  }
}

/* ------------------------------------------------------------------
   QUERY SELECTED MEASURES TABLE
------------------------------------------------------------------ */

async function querySelectedRowsForReach(reachId) {
  var url = CONFIG.SELECTED_MEASURES_TABLE_URL.replace(/\/$/, "") + "/query";

  var where = CONFIG.FIELD_SELECTED_REACH_ID + " = '" + escapeSqlLiteral(reachId) + "'";

  var formData = new FormData();
  formData.append("f", "json");
  formData.append("where", where);
  formData.append("outFields", "*");
  formData.append("returnGeometry", "false");

  if (CONFIG.SELECTED_MEASURES_TOKEN) {
    formData.append("token", CONFIG.SELECTED_MEASURES_TOKEN);
  }

  var response = await fetch(url, {
    method: "POST",
    body: formData
  });

  if (!response.ok) {
    throw new Error("HTTP error while loading selected measures: " + response.status);
  }

  var result = await response.json();

  if (result.error) {
    throw new Error(result.error.message || "ArcGIS query error from selected measures table.");
  }

  if (!result.features) { return []; }

  return result.features
    .map(function(feature) {
      var a = feature.attributes;
      return {
        measure_id: a[CONFIG.FIELD_MEASURE_ID],
        measure_name: a[CONFIG.FIELD_MEASURE_NAME],
        measure_group: a[CONFIG.FIELD_MEASURE_GROUP]
      };
    })
    .filter(function(row) {
      return row.measure_id !== null && row.measure_id !== undefined && String(row.measure_id).length > 0;
    });
}

/* ------------------------------------------------------------------
   HELPERS
------------------------------------------------------------------ */

function getMeasureById(id) {
  return MEASURES.find(function(m) {
    return m.id === id;
  });
}

function isUrlConfigured(url) {
  return (
    url &&
    url.indexOf("PASTE_") === -1 &&
    url.indexOf("YOUR_") === -1
  );
}

function setStatus(message, type) {
  var el = document.getElementById("status-message");

  el.textContent = message;
  el.className = "status-message";

  if (type) {
    el.classList.add(type);
  }
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeSqlLiteral(value) {
  return String(value).replaceAll("'", "''");
}
